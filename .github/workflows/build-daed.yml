name: Build daed binary

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

env:
  # QiuSimons 最新版本锁定（从 daed/Makefile 提取）
  DAED_COMMIT: 671e65d2fdcd62fe6a3ec18ecda209c5addea898
  WING_COMMIT: dc50308
  CORE_COMMIT: 09c6c8c
  PGO_URL: https://github.com/QiuSimons/luci-app-dae/raw/refs/heads/kix/dae/pprof/default.pgo

jobs:
  build:
    name: Build daed (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout daed source (daeuniverse/daed @ QiuSimons 锁定 commit)
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          ref: ${{ env.DAED_COMMIT }}
          fetch-depth: 0

      - name: Checkout dae-wing @ ${{ env.WING_COMMIT }}
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/dae-wing
          ref: ${{ env.WING_COMMIT }}
          path: wing
          fetch-depth: 0

      - name: Checkout dae-core @ ${{ env.CORE_COMMIT }}
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/dae
          ref: ${{ env.CORE_COMMIT }}
          path: wing/dae-core
          fetch-depth: 0

      - name: Init dae-core submodules
        run: |
          cd wing/dae-core && git submodule update --init

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.22'
          cache-dependency-path: wing/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-15 clang-15 make
          echo "CLANG=clang-15" >> $GITHUB_ENV
          echo "BPF_STRIP_FLAG=-no-strip" >> $GITHUB_ENV

      - name: Install pnpm
        run: npm install -g pnpm@10.24.0

      - name: Build web frontend
        run: |
          pnpm install --no-frozen-lockfile
          TURBO_TELEMETRY_DISABLED=1 DO_NOT_TRACK=1 pnpm build --filter daed
          mkdir -p wing/webrender/web
          cp -r apps/web/dist/* wing/webrender/web/
          # gzip large files (match QiuSimons' process)
          find wing/webrender/web -type f -size +4k ! -name "*.gz" ! -name "*.woff" ! -name "*.woff2" -exec sh -c '
            gzip -9 -k "{}"
            if [ "$(stat -c %s {})" -lt "$(stat -c %s {}.gz)" ]; then
              rm "{}.gz"
            else
              rm "{}"
            fi
          ' ';'

      - name: Download PGO profile
        run: |
          wget -qO wing/default.pgo "${{ env.PGO_URL }}"

      - name: Generate version string (match QiuSimons format)
        id: version
        run: |
          echo "full_version=daed-${DAED_COMMIT:0:7}_wing-${WING_COMMIT}_core-${CORE_COMMIT}" >> $GITHUB_OUTPUT

      - name: Build daed binary
        run: |
          cd wing
          # go get -u=patch && go mod tidy (match QiuSimons)
          cd dae-core
          go get -u=patch; go mod tidy
          cd ..
          go get -u=patch; go mod tidy
          # generate schema + eBPF
          export GOFLAGS="-trimpath -buildvcs=false -pgo=auto"
          go generate ./...
          # build eBPF in dae-core
          cd dae-core
          export BPF_CLANG=clang-15 BPF_CFLAGS="-O2 -Wall -Werror -DMAX_MATCH_SET_LEN=1024" BPF_TARGET="bpfel,bpfeb" BPF_TRACE_TARGET="amd64"
          go generate ./control/control.go
          go generate ./trace/trace.go
          cd ..
          # compile final binary with embedallowed + trace tags
          go build -tags="embedallowed,trace" \
            -ldflags="-s -w -buildid= -X 'github.com/daeuniverse/dae-wing/db.AppDescription=daed is a integration solution of dae, API and UI.' -X github.com/daeuniverse/dae-wing/db.AppName=daed -X github.com/daeuniverse/dae-wing/db.AppVersion=${{ steps.version.outputs.full_version }}" \
            -o ../daed-x86_64 \
            -trimpath -buildvcs=false -pgo=auto .
          cd ..

      - name: Verify binary
        run: |
          file daed-x86_64
          chmod +x daed-x86_64
          ./daed-x86_64 --version
          ls -lh daed-x86_64

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-linux-x86_64
          path: daed-x86_64
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release tag
        id: meta
        run: |
          echo "tag=daed_build_$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "daed build ${{ github.run_number }} (${{ steps.meta.outputs.tag }})"
          body: |
            Built from daeuniverse/daed @ ${{ env.DAED_COMMIT }}
            Built from daeuniverse/dae-wing @ ${{ env.WING_COMMIT }}
            Built from daeuniverse/dae @ ${{ env.CORE_COMMIT }}
          files: artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
