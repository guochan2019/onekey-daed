name: Build daed binary

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  build:
    name: Extract daed from QiuSimons APK
    runs-on: ubuntu-24.04
    steps:
      - name: Download QiuSimons latest daed APK (x86_64)
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/QiuSimons/luci-app-daed/releases/latest" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['tag_name'])")
          echo "version=${VERSION}" >> $GITHUB_ENV
          wget -q "https://github.com/QiuSimons/luci-app-daed/releases/download/${VERSION}/daed-${VERSION#daed_}-x86_64-openwrt-25.12.apk" \
            -O /tmp/daed.apk

      - name: Extract binary via Alpine Docker
        run: |
          docker run --rm -v /tmp:/data alpine:latest sh -c "
            apk add -q apk-tools
            mkdir -p /extract
            apk extract /data/daed.apk --destination /extract --allow-untrusted
            cp /extract/usr/bin/daed /data/daed-bin
            chmod +x /data/daed-bin
          "

      - name: Verify binary
        run: |
          file /tmp/daed-bin
          chmod +x /tmp/daed-bin
          /tmp/daed-bin --help 2>&1 | head -3

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-linux-x86_64
          path: /tmp/daed-bin
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: daed-linux-x86_64
          path: artifacts

      - name: Generate release tag
        id: meta
        run: |
          echo "tag=daed_build_$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "daed build ${{ github.run_number }} (${{ steps.meta.outputs.tag }})"
          body: |
            Extracted from QiuSimons/luci-app-daed latest release (daed + patches)
          files: artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
