name: Build daed binary

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  resolve:
    name: Resolve QiuSimons versions
    runs-on: ubuntu-24.04
    outputs:
      daed_commit: ${{ steps.parse.outputs.daed_commit }}
      wing_commit: ${{ steps.parse.outputs.wing_commit }}
      core_commit: ${{ steps.parse.outputs.core_commit }}
      full_version: ${{ steps.parse.outputs.full_version }}
    steps:
      - name: Checkout QiuSimons/luci-app-daed
        uses: actions/checkout@v4
        with:
          repository: QiuSimons/luci-app-daed
          ref: kix
          path: qiurepo
          fetch-depth: 1

      - name: Parse Makefile for commit hashes
        id: parse
        run: |
          MAKEFILE=qiurepo/daed/Makefile
          DAED_VER=$(grep '^DAED_VERSION:=' "$MAKEFILE" | cut -d= -f2)
          WING_VER=$(grep '^WING_VERSION:=' "$MAKEFILE" | cut -d= -f2)
          CORE_VER=$(grep '^CORE_VERSION:=' "$MAKEFILE" | cut -d= -f2)
          DAED_HASH=$(grep '^PKG_SOURCE_VERSION:=' "$MAKEFILE" | cut -d= -f2)
          WING_SHORT=${WING_VER#wing-}
          CORE_SHORT=${CORE_VER#core-}
          # 短 SHA 不足以让 checkout action 使用，通过 GitHub API 补齐完整 SHA
          resolve_sha() {
            local repo="$1" short="$2"
            curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${repo}/commits/${short}" \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('sha',''))"
          }
          WING_FULL=$(resolve_sha daeuniverse/dae-wing "$WING_SHORT")
          CORE_FULL=$(resolve_sha daeuniverse/dae "$CORE_SHORT")
          echo "daed_commit=${DAED_HASH}" >> $GITHUB_OUTPUT
          echo "wing_commit=${WING_FULL}" >> $GITHUB_OUTPUT
          echo "core_commit=${CORE_FULL}" >> $GITHUB_OUTPUT
          echo "full_version=${DAED_VER}_${WING_VER}_${CORE_VER}" >> $GITHUB_OUTPUT
          echo "Using: ${DAED_VER}_${WING_VER}_${CORE_VER}"
          echo "  daed: ${DAED_HASH:0:7}"
          echo "  wing: ${WING_SHORT} -> ${WING_FULL}"
          echo "  core: ${CORE_SHORT} -> ${CORE_FULL}"

  build:
    name: Build daed (x86_64)
    runs-on: ubuntu-24.04
    needs: resolve
    steps:
      - name: Checkout daed source
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          ref: ${{ needs.resolve.outputs.daed_commit }}
          fetch-depth: 0

      - name: Checkout dae-wing @ ${{ needs.resolve.outputs.wing_commit }}
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/dae-wing
          ref: ${{ needs.resolve.outputs.wing_commit }}
          path: wing
          fetch-depth: 0

      - name: Checkout dae-core @ ${{ needs.resolve.outputs.core_commit }}
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/dae
          ref: ${{ needs.resolve.outputs.core_commit }}
          path: wing/dae-core
          fetch-depth: 0

      - name: Init dae-core submodules
        run: |
          cd wing/dae-core && git submodule update --init

      - name: Checkout QiuSimons patches (keep last to avoid cleanup)
        uses: actions/checkout@v4
        with:
          repository: QiuSimons/luci-app-daed
          ref: kix
          path: qiurepo
          fetch-depth: 1

      - name: Apply QiuSimons patches
        run: |
          python3 << 'PYEOF'
          import subprocess, os, glob

          os.chdir("wing")
          patches = sorted(glob.glob("../qiurepo/patchset/*.patch"))
          if not patches:
              print("No patches found!")
              exit(1)

          def apply_patch(patch_path, cwd, strip_path=None):
              """Try to apply a patch file from a given directory. Optionally strip a path prefix."""
              if strip_path:
                  # Read patch, strip prefix from paths
                  with open(patch_path) as f:
                      content = f.read()
                  import re
                  content = re.sub(
                      rf'^(---|\+\+\+) [ab]/{re.escape(strip_path)}/',
                      r'\1 a/',
                      content,
                      flags=re.MULTILINE
                  )
                  result = subprocess.run(
                      ["git", "apply", "--ignore-whitespace", "-v", "-"],
                      input=content, capture_output=True, text=True, cwd=cwd
                  )
              else:
                  result = subprocess.run(
                      ["git", "apply", "--ignore-whitespace", "-v", patch_path],
                      capture_output=True, text=True, cwd=cwd
                  )
              return result

          def section_groups(patch_path):
              """Split a patch into per-file sections."""
              with open(patch_path) as f:
                  content = f.read()
              # Skip everything before the first diff --git
              if "diff --git" not in content:
                  return [content]
              content = content[content.index("diff --git"):]
              sections = content.split("\ndiff --git ")
              # Re-add the diff --git prefix (except for the first one)
              result = [sections[0]]
              for s in sections[1:]:
                  result.append("diff --git " + s)
              return result

          for p in patches:
              pname = os.path.basename(p)
              print(f"=== {pname} ===")

              sections = section_groups(p)
              if len(sections) <= 1:
                  # Single-file patch: try wing/ then dae-core/
                  for cwd in [".", "dae-core"]:
                      r = apply_patch(p, cwd)
                      if r.returncode == 0:
                          print(f"  → applied to {'wing/' if cwd == '.' else 'wing/dae-core/'}")
                          break
                      # If only 'No such file', try again with stripped prefix
                      if "No such file" in r.stderr:
                          # Try stripping dae-core/ prefix
                          r2 = apply_patch(p, cwd, strip_path="dae-core")
                          if r2.returncode == 0:
                              print(f"  → applied to wing/dae-core/ (stripped dae-core/)")
                              break
                  else:
                      # Last resort: apply to both, ignore failures
                      apply_patch(p, ".", "dae-core")
                      apply_patch(p, "dae-core")
                      print(f"  → applied (multi-target)")
              else:
                  # Multi-file patch: apply each section to the right directory
                  any_fail = False
                  for section in sections:
                      # Extract the target path from diff --git line
                      diff_line = [l for l in section.split('\n') if l.startswith('diff --git')][0]
                      # Get the file path (after 'b/')
                      target_path = diff_line.split(' b/')[-1]
                      
                      # Try wing/
                      r = subprocess.run(
                          ["git", "apply", "--ignore-whitespace", "-v", "-"],
                          input=section, capture_output=True, text=True, cwd="."
                      )
                      if r.returncode == 0:
                          print(f"  {target_path}: → wing/ ✓")
                          continue
                      
                      # Try dae-core/
                      r = subprocess.run(
                          ["git", "apply", "--ignore-whitespace", "-v", "-"],
                          input=section, capture_output=True, text=True, cwd="dae-core"
                      )
                      if r.returncode == 0:
                          print(f"  {target_path}: → dae-core/ ✓")
                          continue
                      
                      # Try with dae-core/ prefix stripped
                      section_stripped = re.sub(
                          r'^(---|\+\+\+) [ab]/dae-core/',
                          r'\1 a/',
                          section,
                          flags=re.MULTILINE
                      )
                      r = subprocess.run(
                          ["git", "apply", "--ignore-whitespace", "-v", "-"],
                          input=section_stripped, capture_output=True, text=True, cwd="dae-core"
                      )
                      if r.returncode == 0:
                          print(f"  {target_path}: → dae-core/ (stripped) ✓")
                          continue
                      
                      print(f"  {target_path}: ✗ FAILED")
                      print(f"    stderr: {r.stderr[:200]}")
                      any_fail = True
                  
                  if any_fail:
                      exit(1)
                  print(f"  → all sections applied")

          PYEOF

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.22'
          cache-dependency-path: wing/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-15 clang-15 make
          echo "CLANG=clang-15" >> $GITHUB_ENV
          echo "BPF_STRIP_FLAG=-no-strip" >> $GITHUB_ENV

      - name: Install pnpm
        run: npm install -g pnpm@10.24.0

      - name: Build web frontend
        run: |
          pnpm install --no-frozen-lockfile
          TURBO_TELEMETRY_DISABLED=1 DO_NOT_TRACK=1 pnpm build --filter daed
          mkdir -p wing/webrender/web
          cp -r apps/web/dist/* wing/webrender/web/
          # gzip large files (match QiuSimons' process)
          find wing/webrender/web -type f -size +4k ! -name "*.gz" ! -name "*.woff" ! -name "*.woff2" -exec sh -c '
            gzip -9 -k "{}"
            if [ "$(stat -c %s {})" -lt "$(stat -c %s {}.gz)" ]; then
              rm "{}.gz"
            else
              rm "{}"
            fi
          ' ';'

      - name: Generate version string (match QiuSimons format)
        id: version
        run: |
          echo "full_version=${{ needs.resolve.outputs.full_version }}" >> $GITHUB_OUTPUT

      - name: Build daed binary
        run: |
          cd wing
          # go get -u=patch && go mod tidy (match QiuSimons)
          cd dae-core
          go get -u=patch; go mod tidy
          cd ..
          go get -u=patch; go mod tidy
          # generate schema + eBPF
          export GOFLAGS="-trimpath -buildvcs=false"
          go generate ./...
          # build eBPF in dae-core
          cd dae-core
          export BPF_CLANG=clang-15 BPF_CFLAGS="-O2 -Wall -Werror -DMAX_MATCH_SET_LEN=1024" BPF_TARGET="bpfel,bpfeb" BPF_TRACE_TARGET="amd64"
          go generate ./control/control.go
          go generate ./trace/trace.go
          cd ..
          # compile final binary with embedallowed + trace tags
          go build -tags="embedallowed,trace" \
            -ldflags="-s -w -buildid= -X 'github.com/daeuniverse/dae-wing/db.AppDescription=daed is a integration solution of dae, API and UI.' -X github.com/daeuniverse/dae-wing/db.AppName=daed -X github.com/daeuniverse/dae-wing/db.AppVersion=${{ steps.version.outputs.full_version }}" \
            -o ../daed-linux-x86_64 \
            -trimpath -buildvcs=false .

      - name: Verify binary
        run: |
          file daed-linux-x86_64
          chmod +x daed-linux-x86_64
          ./daed-linux-x86_64 --version
          ls -lh daed-linux-x86_64

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-linux-x86_64
          path: daed-linux-x86_64
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create release
    runs-on: ubuntu-24.04
    needs:
      - build
      - resolve
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release tag
        id: meta
        run: |
          echo "tag=daed_build_$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "daed build ${{ github.run_number }} (${{ steps.meta.outputs.tag }})"
          body: |
            Built from daeuniverse/daed @ ${{ needs.resolve.outputs.daed_commit }}
            Built from daeuniverse/dae-wing @ ${{ needs.resolve.outputs.wing_commit }}
            Built from daeuniverse/dae @ ${{ needs.resolve.outputs.core_commit }}
            Applied QiuSimons patches: 0001-fix-runtime-stats, build_fixes, kix-bind_fix, kix-feat_DNS_high_concurrency_optimization, kix-feat_lockless_concurrency_udp_dns
          files: artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
