name: Build daed binary

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  resolve:
    name: Resolve daed version
    runs-on: ubuntu-24.04
    outputs:
      daed_commit: ${{ steps.latest.outputs.commit }}
      full_version: ${{ steps.latest.outputs.version }}
    steps:
      - name: Get latest daed commit
        id: latest
        run: |
          COMMIT=$(curl -s "https://api.github.com/repos/QiuSimons/luci-app-daed/commits/kix" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['sha'])")
          SHORT=$(echo $COMMIT | cut -c1-7)
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "version=daed-${SHORT}" >> $GITHUB_OUTPUT
          echo "Using QiuSimons/luci-app-daed @ ${SHORT}"

  build:
    name: Build daed (x86_64)
    runs-on: ubuntu-24.04
    needs: resolve
    steps:
      - name: Checkout QiuSimons/luci-app-daed (patches + daed source)
        uses: actions/checkout@v4
        with:
          repository: QiuSimons/luci-app-daed
          ref: kix
          path: qiurepo
          fetch-depth: 0

      - name: Extract daed commit from Makefile
        id: makefile
        run: |
          MAKEFILE=qiurepo/daed/Makefile
          DAED_HASH=$(grep '^PKG_SOURCE_VERSION:=' "$MAKEFILE" | cut -d= -f2)
          echo "hash=${DAED_HASH}" >> $GITHUB_OUTPUT
          echo "Using daed @ ${DAED_HASH:0:7}"

      - name: Checkout official daed source with submodules
        uses: actions/checkout@v4
        with:
          repository: daeuniverse/daed
          ref: ${{ steps.makefile.outputs.hash }}
          path: daed-src
          fetch-depth: 0
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.22'
          cache-dependency-path: daed-src/wing/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-15 clang-15 make patch
          echo "CLANG=clang-15" >> $GITHUB_ENV
          echo "BPF_STRIP_FLAG=-no-strip" >> $GITHUB_ENV

      - name: Install pnpm
        run: npm install -g pnpm@10.24.0

      - name: Apply all patches (to daed-src/wing)
        run: |
          cd daed-src/wing

          # 复制补丁到本地
          cp -r ../../qiurepo/patchset/*.patch .

          # 用 openwrt 标准方法：patch -p1 --fuzz=3 从 wing/ 根目录打
          for p in *.patch; do
            echo "=== Applying: $p ==="
            patch -p1 -f --fuzz=3 < "$p" 2>&1 || true
            echo ""
          done

          # 检查是否有 .rej 文件（失败的 hunk）
          REJ_COUNT=$(find . -name "*.rej" 2>/dev/null | wc -l)
          if [ "$REJ_COUNT" -gt 0 ]; then
            echo "⚠ $REJ_COUNT .rej files found (failed hunks):"
            find . -name "*.rej"
            echo "Build will continue with partial patches"
          else
            echo "✅ All patches applied cleanly"
          fi

      - name: Build web frontend
        run: |
          cd daed-src
          pnpm install --no-frozen-lockfile
          TURBO_TELEMETRY_DISABLED=1 DO_NOT_TRACK=1 pnpm build --filter daed
          mkdir -p wing/webrender/web
          cp -r apps/web/dist/* wing/webrender/web/
          find wing/webrender/web -type f -size +4k ! -name "*.gz" ! -name "*.woff" ! -name "*.woff2" -exec sh -c '
            gzip -9 -k "{}"
            if [ "$(stat -c %s {})" -lt "$(stat -c %s {}.gz)" ]; then
              rm "{}.gz"
            else
              rm "{}"
            fi
          ' ';'

      - name: Generate version string
        id: version
        run: |
          echo "full_version=${{ steps.makefile.outputs.hash }}" >> $GITHUB_OUTPUT

      - name: Go generate
        run: |
          cd daed-src/wing
          go get -u=patch; go mod tidy
          export GOFLAGS="-trimpath -buildvcs=false"
          go generate ./...

      - name: Build daed binary
        run: |
          cd daed-src/wing
          cd dae-core
          export BPF_CLANG=clang-15 BPF_CFLAGS="-O2 -Wall -Werror -DMAX_MATCH_SET_LEN=1024" BPF_TARGET="bpfel,bpfeb" BPF_TRACE_TARGET="amd64"
          go generate ./control/control.go
          go generate ./trace/trace.go
          cd ..
          go build -tags="embedallowed,trace" \
            -ldflags="-s -w -buildid= -X 'github.com/daeuniverse/dae-wing/db.AppDescription=daed is a integration solution of dae, API and UI.' -X github.com/daeuniverse/dae-wing/db.AppName=daed -X github.com/daeuniverse/dae-wing/db.AppVersion=${{ steps.version.outputs.full_version }}" \
            -o ../daed-linux-x86_64 \
            -trimpath -buildvcs=false .

      - name: Verify binary
        run: |
          file daed-src/daed-linux-x86_64
          chmod +x daed-src/daed-linux-x86_64
          daed-src/daed-linux-x86_64 --version
          ls -lh daed-src/daed-linux-x86_64

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: daed-linux-x86_64
          path: daed-src/daed-linux-x86_64
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create release
    runs-on: ubuntu-24.04
    needs:
      - build
      - resolve
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release tag
        id: meta
        run: |
          echo "tag=daed_build_$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "daed build ${{ github.run_number }} (${{ steps.meta.outputs.tag }})"
          body: |
            Built from daeuniverse/daed submodules with QiuSimons patches
          files: artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
